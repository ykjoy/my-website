<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg2: #0f1623;
    --surface: #131d2e;
    --surface2: #1a2740;
    --border: #1e3050;
    --border2: #243858;
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.12);
    --amber: #ffaa00;
    --amber-dim: rgba(255,170,0,0.12);
    --green: #00e5a0;
    --green-dim: rgba(0,229,160,0.12);
    --pink: #ff4d94;
    --pink-dim: rgba(255,77,148,0.12);
    --text: #e0eaf8;
    --text2: #7a95b8;
    --text3: #3d5a80;
    --glow-cyan: 0 0 20px rgba(0,212,255,0.3);
    --glow-amber: 0 0 20px rgba(255,170,0,0.3);
    --radius: 14px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  [data-theme="light"] {
    --bg: #eef2f8;
    --bg2: #e4eaf5;  
    --surface: #ffffff;
    --surface2: #f0f4fb;
    --border: #cdd8ec;
    --border2: #b8c8e0;
    --text: #0f1c30;
    --text2: #4a6080;
    --text3: #8aa0bc;
    --cyan-dim: rgba(0,150,200,0.1);
    --amber-dim: rgba(200,130,0,0.1);
    --green-dim: rgba(0,160,110,0.1);
    --pink-dim: rgba(200,50,120,0.1);
    --glow-cyan: 0 2px 12px rgba(0,150,200,0.15);
    --glow-amber: 0 2px 12px rgba(200,130,0,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  [data-theme="light"] body::before {
    background-image:
      linear-gradient(rgba(0,100,180,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,100,180,0.04) 1px, transparent 1px);
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px 60px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .brand-title {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .brand-title span {
    color: var(--cyan);
  }
  .brand-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .greeting {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text2);
  }
  .greeting span { color: var(--amber); font-weight: 700; }

  /* Dark mode toggle */
  .theme-toggle {
    width: 52px; height: 28px;
    background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: 14px;
    cursor: pointer;
    position: relative;
    transition: all 0.3s;
    flex-shrink: 0;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    background: var(--cyan);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.3s, background 0.3s;
    box-shadow: 0 0 8px var(--cyan);
  }
  [data-theme="light"] .theme-toggle::after {
    transform: translateX(24px);
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
  }
  .theme-icon {
    position: absolute;
    font-size: 10px;
    top: 50%; transform: translateY(-50%);
  }
  .theme-icon.moon { right: 7px; }
  .theme-icon.sun  { left: 6px; }

  /* ── KPI WIDGETS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card.k-date::before  { background: linear-gradient(90deg, var(--cyan), transparent); }
  .kpi-card.k-time::before  { background: linear-gradient(90deg, var(--amber), transparent); }
  .kpi-card:hover { transform: translateY(-3px); border-color: var(--border2); }
  .kpi-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    color: var(--text);
  }
  .kpi-card.k-date .kpi-value  { color: var(--cyan); }
  .kpi-card.k-time .kpi-value  { color: var(--amber); font-size: 32px; }
  .kpi-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
    font-family: var(--font-mono);
  }
  .kpi-icon {
    position: absolute;
    right: 18px; top: 50%;
    transform: translateY(-50%);
    font-size: 32px;
    opacity: 0.15;
  }

  /* ── MAIN LAYOUT ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  /* ── LINK SECTION CARDS ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .section-card:hover { border-color: var(--border2); }
  .section-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-emoji { font-size: 18px; }
  .section-title {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: var(--text);
  }
  .section-count {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .links-list {
    padding: 10px 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .link-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 9px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s, transform 0.15s, color 0.15s;
    position: relative;
    overflow: hidden;
    border: 1px solid transparent;
  }
  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan-dim);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .link-item:hover::before { opacity: 1; }
  .link-item:hover {
    border-color: var(--border);
    transform: translateX(4px);
    color: var(--cyan);
  }
  .section-card:nth-child(2) .link-item:hover { color: var(--amber); }
  .section-card:nth-child(2) .link-item::before { background: var(--amber-dim); }
  .section-card:nth-child(3) .link-item:hover { color: var(--green); }
  .section-card:nth-child(3) .link-item::before { background: var(--green-dim); }
  .link-icon { font-size: 16px; flex-shrink: 0; position: relative; z-index: 1; }
  .link-name {
    font-size: 13.5px;
    font-weight: 500;
    position: relative;
    z-index: 1;
    flex: 1;
  }
  .link-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text3);
    position: relative;
    z-index: 1;
  }
  .link-arrow {
    font-size: 11px;
    color: var(--text3);
    opacity: 0;
    position: relative;
    z-index: 1;
    transition: opacity 0.15s;
  }
  .link-item:hover .link-arrow { opacity: 1; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  footer span { color: var(--cyan); }

  /* ── RESPONSIVE ── */
  @media (max-width: 1100px) {
    .main-grid { grid-template-columns: 1fr 1fr; }
    .section-card:nth-child(3) { grid-column: 1 / -1; }
    .links-list { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  }
  @media (max-width: 760px) {
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .main-grid { grid-template-columns: 1fr; }
    .section-card:nth-child(3) { grid-column: unset; }
    .links-list { grid-template-columns: 1fr; }
    .container { padding: 20px 16px 40px; }
  }
  @media (max-width: 480px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .brand { flex-direction: column; gap: 2px; }
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .kpi-card    { animation: fadeUp 0.5s ease both; }
  .kpi-card:nth-child(1) { animation-delay: 0.05s; }
  .kpi-card:nth-child(2) { animation-delay: 0.10s; }
  .kpi-card:nth-child(3) { animation-delay: 0.15s; }
  .kpi-card:nth-child(4) { animation-delay: 0.20s; }
  .section-card { animation: fadeUp 0.5s ease both; }
  .section-card:nth-child(1) { animation-delay: 0.25s; }
  .section-card:nth-child(2) { animation-delay: 0.30s; }
  .section-card:nth-child(3) { animation-delay: 0.35s; }
  .chart-card { animation: fadeUp 0.5s ease both; }
  .chart-card:nth-child(1) { animation-delay: 0.40s; }
  .chart-card:nth-child(2) { animation-delay: 0.45s; }

  /* Pulse dot */
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 5px;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-title">My <span>Command</span> Center</div>
      <div class="brand-sub">// PERSONAL START PAGE</div>
    </div>
    <div class="header-right">
      <div class="greeting"><span class="live-dot"></span>안녕하세요, <span id="greeting-text">좋은 하루</span>입니다!</div>
      <button class="theme-toggle" id="themeToggle" title="다크/라이트 모드 전환" aria-label="테마 전환">
        <span class="theme-icon sun">☀️</span>
        <span class="theme-icon moon">🌙</span>
      </button>
    </div>
  </header>

  <!-- KPI WIDGETS -->
  <div class="kpi-grid">
    <div class="kpi-card k-date">
      <div class="kpi-label">// TODAY</div>
      <div class="kpi-value" id="kpi-date">—</div>
      <div class="kpi-sub" id="kpi-weekday">—</div>
      <span class="kpi-icon">📅</span>
    </div>
    <div class="kpi-card k-time">
      <div class="kpi-label">// CURRENT TIME</div>
      <div class="kpi-value" id="kpi-time">—</div>
      <div class="kpi-sub" id="kpi-seconds">—</div>
      <span class="kpi-icon">⏱️</span>
    </div>
  </div>

  <!-- LINK SECTIONS -->
  <div class="main-grid" id="link-sections">

    <!-- 1. 매일 확인 -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-emoji">☀️</span>
        <span class="section-title">매일 확인</span>
        <span class="section-count" id="count-daily">0개</span>
      </div>
      <div class="links-list" id="links-daily"></div>
    </div>

    <!-- 2. 연구 & 논문 -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-emoji">🔬</span>
        <span class="section-title">연구 &amp; 논문</span>
        <span class="section-count" id="count-research">0개</span>
      </div>
      <div class="links-list" id="links-research"></div>
    </div>

    <!-- 3. 엔터테인먼트 -->
    <div class="section-card">
      <div class="section-header">
        <span class="section-emoji">🎬</span>
        <span class="section-title">엔터테인먼트</span>
        <span class="section-count" id="count-ent">0개</span>
      </div>
      <div class="links-list" id="links-ent"></div>
    </div>
  </div>

  <footer>
    <span>⚡ My Command Center</span> · 개인 맞춤형 시작 페이지 · Built with ♥
  </footer>

</div>

<script>
// ────────────────────────────────────────
//  DATA
// ────────────────────────────────────────
const LINKS = {
  daily: [
    { icon: '📧', name: 'Gmail',       url: 'https://mail.google.com',        tag: 'google'   },
    { icon: '📰', name: '네이버 뉴스', url: 'https://news.naver.com',          tag: 'naver'    },
    { icon: '🌍', name: 'BBC News',    url: 'https://www.bbc.com/news',        tag: 'global'   },
    { icon: '📊', name: 'Google Drive',url: 'https://drive.google.com',        tag: 'google'   },
    { icon: '📅', name: 'Google Calendar', url: 'https://calendar.google.com', tag: 'google'  },
    { icon: '💬', name: 'KakaoTalk Web', url: 'https://web.kakao.com',         tag: 'kakao'   },
    { icon: '🐦', name: 'X (Twitter)', url: 'https://x.com',                  tag: 'social'   },
  ],
  research: [
    { icon: '🎓', name: 'Google Scholar', url: 'https://scholar.google.com',   tag: 'scholar'  },
    { icon: '📚', name: 'Scopus',        url: 'https://www.scopus.com',        tag: 'database' },
    { icon: '🏛️', name: 'RISS',          url: 'https://www.riss.kr',           tag: 'korea'    },
    { icon: '🔭', name: 'PubMed',        url: 'https://pubmed.ncbi.nlm.nih.gov', tag: 'medical'},
    { icon: '📄', name: 'arXiv',         url: 'https://arxiv.org',             tag: 'preprint' },
    { icon: '🗂️', name: 'KISS',          url: 'https://kiss.kstudy.com',       tag: 'korea'    },
    { icon: '🌐', name: 'ResearchGate',  url: 'https://www.researchgate.net',  tag: 'network'  },
  ],
  ent: [
    { icon: '▶️', name: 'YouTube',      url: 'https://www.youtube.com',        tag: 'video'    },
    { icon: '🎬', name: 'Netflix',      url: 'https://www.netflix.com',        tag: 'stream'   },
    { icon: '🛒', name: '쿠팡플레이',   url: 'https://www.coupangplay.com',    tag: 'stream'   },
    { icon: '🎵', name: 'Spotify',      url: 'https://open.spotify.com',       tag: 'music'    },
    { icon: '🎮', name: 'Steam',        url: 'https://store.steampowered.com', tag: 'game'     },
    { icon: '📱', name: '왓챠',         url: 'https://watcha.com',             tag: 'stream'   },
    { icon: '🃏', name: 'Twitch',       url: 'https://www.twitch.tv',          tag: 'stream'   },
  ],
};

// ────────────────────────────────────────
//  RENDER LINKS
// ────────────────────────────────────────
function renderLinks(containerId, countId, items) {
  const el = document.getElementById(containerId);
  const ct = document.getElementById(countId);
  el.innerHTML = items.map(l => `
    <a href="${l.url}" target="_blank" rel="noopener" class="link-item">
      <span class="link-icon">${l.icon}</span>
      <span class="link-name">${l.name}</span>
      <span class="link-tag">${l.tag}</span>
      <span class="link-arrow">→</span>
    </a>`).join('');
  ct.textContent = items.length + '개';
}

renderLinks('links-daily',    'count-daily',    LINKS.daily);
renderLinks('links-research', 'count-research', LINKS.research);
renderLinks('links-ent',      'count-ent',       LINKS.ent);

// ────────────────────────────────────────
//  CLOCK & DATE
// ────────────────────────────────────────
const WEEKDAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const MONTHS   = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function updateClock() {
  const now = new Date();
  const h  = String(now.getHours()).padStart(2,'0');
  const m  = String(now.getMinutes()).padStart(2,'0');
  const s  = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('kpi-time').textContent    = `${h}:${m}`;
  document.getElementById('kpi-seconds').textContent = `${s}초 · ${now.getFullYear()}`;
  document.getElementById('kpi-date').textContent    = `${now.getMonth()+1}월 ${now.getDate()}일`;
  document.getElementById('kpi-weekday').textContent = WEEKDAYS[now.getDay()];

  const g = now.getHours();
  const txt = g < 6 ? '좋은 밤' : g < 12 ? '좋은 아침' : g < 18 ? '좋은 오후' : '좋은 저녁';
  document.getElementById('greeting-text').textContent = txt;
}
updateClock();
setInterval(updateClock, 1000);

// ────────────────────────────────────────
//  THEME TOGGLE
// ────────────────────────────────────────
document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

// Load saved theme
const saved = localStorage.getItem('theme');
if (saved) {
  document.documentElement.setAttribute('data-theme', saved);
}
</script>
</body>
</html>
